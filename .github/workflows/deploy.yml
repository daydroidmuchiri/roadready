# Deployment is handled by native integrations:
#   Backend  -> Railway native GitHub integration (auto-deploys on push to main)
#   Admin    -> Vercel native GitHub integration (auto-deploys on push to main)
# This workflow only runs tests and notifies on failure.

name: RoadReady CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '20'

jobs:

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     roadready
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB:       roadready_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL:      postgresql://roadready:testpassword@localhost:5432/roadready_test
          NODE_ENV:          test
          JWT_SECRET:        test-secret-not-for-production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMS_DRY_RUN:       'true'
        run: npm run migrate

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL:      postgresql://roadready:testpassword@localhost:5432/roadready_test
          NODE_ENV:          test
          JWT_SECRET:        test-secret-not-for-production
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMS_DRY_RUN:       'true'
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/coverage/

  notify-failure:
    name: Notify on Failure
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Send failure SMS via Africa's Talking
        # In production you'd use a Slack webhook or PagerDuty instead.
        # This is just a placeholder for alerting.
        run: |
          echo "Deployment failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Author: ${{ github.actor }}"
